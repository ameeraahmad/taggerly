<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Dubizzle Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        secondary: '#F5F5F5',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">

    <!-- Sidebar -->
    <aside
        class="fixed inset-y-0 left-0 w-64 bg-primary text-white transition-transform transform -translate-x-full md:translate-x-0 z-50">
        <div class="p-6">
            <h1 class="text-2xl font-bold mb-8">Admin Panel</h1>
            <nav class="space-y-4">
                <button
                    class="w-full flex items-center space-x-3 p-3 rounded-lg bg-white/10 hover:bg-white/20 transition"
                    onclick="showTab('dashboard')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                        </path>
                    </svg>
                    <span>Dashboard</span>
                </button>
                <button class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition"
                    onclick="showTab('users')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    <span>Users</span>
                </button>
                <button class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition"
                    onclick="showTab('ads')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    <span>Ads</span>
                </button>
                <button class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition"
                    onclick="showTab('reports')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    <span>Reports</span>
                </button>
                <div class="pt-10 border-t border-white/10">
                    <a href="index.html"
                        class="w-full flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                            </path>
                        </svg>
                        <span>Back to Site</span>
                    </a>
                </div>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-64 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 id="tab-title" class="text-3xl font-bold">Dashboard</h2>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
                <div class="flex items-center space-x-2">
                    <img id="admin-avatar" src="https://via.placeholder.com/40"
                        class="w-10 h-10 rounded-full border-2 border-primary">
                    <span id="admin-name" class="font-bold">Admin</span>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <div id="tab-dashboard" class="tab-content space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- Stat Card -->
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border dark:border-gray-700">
                    <p class="text-sm text-gray-500 uppercase font-bold">Total Users</p>
                    <p id="stat-users" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border dark:border-gray-700">
                    <p class="text-sm text-gray-500 uppercase font-bold">Active Ads</p>
                    <p id="stat-ads" class="text-3xl font-bold mt-2">0</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border dark:border-gray-700">
                    <p class="text-sm text-gray-500 uppercase font-bold">Pending Reports</p>
                    <p id="stat-reports" class="text-3xl font-bold mt-2 text-red-500">0</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border dark:border-gray-700">
                    <p class="text-sm text-gray-500 uppercase font-bold">Total Views</p>
                    <p id="stat-views" class="text-3xl font-bold mt-2 text-indigo-500">0</p>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border dark:border-gray-700">
                <h3 class="text-xl font-bold mb-4">Recent Activity</h3>
                <div id="recent-activity-list" class="space-y-4">
                    <!-- Dynamic -->
                    <p class="text-gray-500 text-sm">Loading activity...</p>
                </div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content hidden space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-sm border dark:border-gray-700">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase font-bold text-gray-500">
                        <tr>
                            <th class="px-6 py-4">User</th>
                            <th class="px-6 py-4">Role</th>
                            <th class="px-6 py-4">Joined</th>
                            <th class="px-6 py-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y dark:divide-gray-700">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Ads Tab -->
        <div id="tab-ads" class="tab-content hidden space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-sm border dark:border-gray-700">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase font-bold text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Ad Title</th>
                            <th class="px-6 py-4">Owner</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Featured</th>
                            <th class="px-6 py-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ads-table-body" class="divide-y dark:divide-gray-700">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Reports Tab -->
        <div id="tab-reports" class="tab-content hidden space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-sm border dark:border-gray-700">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700 text-xs uppercase font-bold text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Ad</th>
                            <th class="px-6 py-4">Reporter</th>
                            <th class="px-6 py-4">Reason</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reports-table-body" class="divide-y dark:divide-gray-700">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="assets/js/api-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('admin-name').textContent = user.name;
            if (user.avatar) document.getElementById('admin-avatar').src = user.avatar;

            loadStats();
            loadAll();

            // Theme Toggle
            const themeBtn = document.getElementById('theme-toggle');
            themeBtn.onclick = () => {
                document.documentElement.classList.toggle('dark');
            };
        });

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('tab-title').textContent = tabId.charAt(0).toUpperCase() + tabId.slice(1);
        }

        async function loadStats() {
            try {
                const res = await apiClient.fetch('/admin/stats');
                document.getElementById('stat-users').textContent = res.data.totalUsers;
                document.getElementById('stat-ads').textContent = res.data.activeAds;
                document.getElementById('stat-reports').textContent = res.data.totalReports;
                document.getElementById('stat-views').textContent = res.data.totalViews || 0;
            } catch (err) {
                console.error('Stats error:', err);
            }
        }

        async function loadAll() {
            loadUsers();
            loadAds();
            loadReports();
        }

        async function loadUsers() {
            try {
                const res = await apiClient.fetch('/admin/users');
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = res.data.map(u => `
                    <tr>
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-3">
                                <img src="${u.avatar}" class="w-8 h-8 rounded-full">
                                <div>
                                    <p class="font-bold">${u.name}</p>
                                    <p class="text-xs text-gray-500">${u.email}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4"><span class="px-2 py-1 text-xs rounded-full ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}">${u.role}</span></td>
                        <td class="px-6 py-4 text-sm">${new Date(u.createdAt).toLocaleDateString()}</td>
                        <td class="px-6 py-4">
                            <button class="text-red-600 hover:text-red-900 font-bold text-sm">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { }
        }

        async function loadAds() {
            try {
                const res = await apiClient.fetch('/admin/ads');
                const tbody = document.getElementById('ads-table-body');
                tbody.innerHTML = res.data.map(ad => `
                    <tr>
                        <td class="px-6 py-4 truncate max-w-xs">${ad.title}</td>
                        <td class="px-6 py-4 text-sm">${ad.user ? ad.user.name : 'Unknown'}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">${ad.status}</span></td>
                        <td class="px-6 py-4">
                            <input type="checkbox" ${ad.isFeatured ? 'checked' : ''} onchange="toggleFeatured(${ad.id}, this.checked)">
                        </td>
                        <td class="px-6 py-4 space-x-2">
                            <button class="text-red-600 hover:text-red-900 text-sm font-bold" onclick="deleteAd(${ad.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { }
        }

        async function loadReports() {
            try {
                const res = await apiClient.fetch('/reports'); // Admin can get all
                const tbody = document.getElementById('reports-table-body');
                tbody.innerHTML = res.data.map(r => `
                    <tr>
                        <td class="px-6 py-4 text-sm"><a href="ad-details.html?id=${r.adId}" class="text-accent underline">View Ad</a></td>
                        <td class="px-6 py-4 text-sm">${r.reporter ? r.reporter.name : 'Unknown'}</td>
                        <td class="px-6 py-4 text-sm font-medium">${r.reason}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 text-xs rounded-full bg-orange-100 text-orange-700">${r.status}</span></td>
                        <td class="px-6 py-4">
                            <button class="bg-primary text-white text-xs px-3 py-1 rounded" onclick="resolveReport(${r.id})">Resolve</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { }
        }

        async function deleteAd(id) {
            if (!confirm('Are you sure you want to delete this ad?')) return;
            try {
                await apiClient.fetch('/admin/ads/' + id, { method: 'DELETE' });
                loadAds();
            } catch (e) { alert(e.message); }
        }

        async function toggleFeatured(id, featured) {
            try {
                await apiClient.fetch('/ads/' + id, {
                    method: 'PUT',
                    body: JSON.stringify({ isFeatured: featured })
                });
            } catch (e) { alert(e.message); }
        }

        async function resolveReport(id) {
            try {
                await apiClient.fetch('/admin/reports/' + id, {
                    method: 'PUT',
                    body: JSON.stringify({ status: 'resolved' })
                });
                loadReports();
            } catch (e) { alert(e.message); }
        }
    </script>
</body>

</html>
