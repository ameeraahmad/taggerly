<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="login">Login / Sign Up - Tagger</title>
    <meta name="description" content="Login or Create a new account on Tagger.">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        secondary: '#F5F5F5',
                        accent: '#FF6B00',
                        success: '#00C853',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Apply theme immediately to prevent flashing
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Facebook SDK -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Google reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=YOUR_SITE_KEY_HERE"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }

        .form-container {
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Header Placeholder -->
    <div id="global-header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div
            class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl animate-slide-up border dark:border-gray-700">
            <!-- Header Text -->
            <div class="text-center mb-8">
                <h2 id="form-title" class="text-3xl font-bold text-gray-900 dark:text-white"
                    data-translate="welcomeTitle">Join Tagger</h2>

                <p id="form-subtitle" class="mt-2 text-gray-600 dark:text-gray-400" data-translate="welcomeSubtitle">
                    Start buying and selling today</p>
            </div>


            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="emailPlaceholder">Email</label>
                    <input id="login-email" type="email" required autocomplete="email"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="example@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="passwordPlaceholder">Password</label>
                    <input id="login-password" type="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="••••••••">
                </div>
                <div class="flex justify-between items-center text-sm">
                    <label class="flex items-center">
                        <input type="checkbox"
                            class="rounded border-gray-300 text-accent focus:ring-accent mr-2 rtl:ml-2 rtl:mr-0">
                        <span data-translate="rememberMe">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="text-accent hover:underline"
                        data-translate="forgotPassword">Forgot Password?</a>
                </div>
                <button type="submit"
                    class="w-full bg-primary py-3 rounded-lg text-white font-bold hover:bg-blue-900 transition transform hover:-translate-y-0.5 shadow-lg mx-auto block"
                    data-translate="signInBtn">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1" data-translate="firstNamePlaceholder">First
                            Name</label>
                        <input id="signup-firstname" type="text"
                            class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                            placeholder="John">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" data-translate="lastNamePlaceholder">Last
                            Name</label>
                        <input id="signup-lastname" type="text"
                            class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                            placeholder="Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="emailPlaceholder">Email</label>
                    <input id="signup-email" type="email" required
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="example@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="passwordPlaceholder">Password</label>
                    <input id="signup-password" type="password" required autocomplete="new-password"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="confirmPasswordPlaceholder">Confirm
                        Password</label>
                    <input id="signup-confirm-password" type="password" required autocomplete="new-password"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="••••••••">
                </div>
                <label class="flex items-start text-sm">
                    <input type="checkbox" required
                        class="mt-1 rounded border-gray-300 text-accent focus:ring-accent mr-2 rtl:ml-2 rtl:mr-0">
                    <span data-translate="agreeTerms">I agree to the Terms and Conditions</span>
                </label>
                <button type="submit"
                    class="w-full bg-accent py-3 rounded-lg text-white font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-lg mx-auto block"
                    data-translate="signUpBtn">Sign Up</button>
            </form>

            <!-- Social Login -->
            <div class="mt-8">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="absolute w-full border-t dark:border-gray-700"></div>
                    <span class="relative bg-white dark:bg-gray-800 px-4 text-sm text-gray-500"
                        data-translate="continueWith">Or continue with</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- Google Login Button -->
                    <button onclick="loginWithGoogle()"
                        class="flex items-center justify-center py-2.5 border dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                        <img src="https://www.svgrepo.com/show/355037/google.svg" class="h-5 w-5 mr-2 rtl:ml-2 rtl:mr-0"
                            alt="Google">
                        <span class="text-sm font-medium">Google</span>
                    </button>

                    <!-- Facebook Login Button -->
                    <button onclick="loginWithFacebook()"
                        class="flex items-center justify-center py-2.5 border dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                        <img src="https://www.svgrepo.com/show/303114/facebook-3.svg"
                            class="h-5 w-5 mr-2 rtl:ml-2 rtl:mr-0" alt="Facebook">
                        <span class="text-sm font-medium">Facebook</span>
                    </button>
                </div>

                <!-- Toggle Link -->
                <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
                    <span id="toggle-text" data-translate="dontHaveAccount">Don't have an account?</span>
                    <a href="#" id="toggle-forms" class="text-accent font-bold hover:underline ml-1 rtl:mr-1 rtl:ml-0"
                        data-translate="createAccount">Sign Up</a>
                </p>
            </div>
    </main>

    <!-- Country Mismatch Modal -->
    <div id="country-mismatch-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden"
        role="dialog" aria-modal="true">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 animate-slide-up border dark:border-gray-700">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3" id="cm-flag">🌍</div>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white" id="cm-title">Wrong Country</h3>
                <p class="mt-2 text-sm text-gray-500 dark:text-gray-400" id="cm-body"></p>
            </div>
            <div class="flex flex-col gap-3">
                <button id="cm-switch-btn"
                    class="w-full bg-accent text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-md">
                </button>
                <button onclick="document.getElementById('country-mismatch-modal').classList.add('hidden')"
                    class="w-full border dark:border-gray-600 text-gray-600 dark:text-gray-300 py-3 rounded-xl font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <span id="cm-cancel">Cancel</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-8 text-center border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4">
            <p class="text-sm" data-translate="rights">&copy; 2026 Tagger. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const toggleBtn = document.getElementById('toggle-forms');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const toggleText = document.getElementById('toggle-text');

        let isLogin = true;

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;

            if (isLogin) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                formTitle.setAttribute('data-translate', 'welcomeBack');
                toggleText.setAttribute('data-translate', 'dontHaveAccount');
                toggleBtn.setAttribute('data-translate', 'createAccount');
                // Force translate update
                if (window.updatePageLanguage) window.updatePageLanguage();
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                formTitle.setAttribute('data-translate', 'welcomeTitle');
                toggleText.setAttribute('data-translate', 'alreadyHaveAccount');
                toggleBtn.setAttribute('data-translate', 'signInBtn');
                // Force translate update
                if (window.updatePageLanguage) window.updatePageLanguage();
            }
        });

        // Check URL for mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'signup') {
            toggleBtn.click();
        }

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = loginForm.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.textContent = currentLang === 'ar' ? 'جارٍ تسجيل الدخول...' : 'Signing in...';

            // ✅ Bug Fix #1: declare captchaToken OUTSIDE try so catch can access it
            let captchaToken = '';
            try {
                try {
                    captchaToken = await grecaptcha.execute('YOUR_SITE_KEY_HERE', { action: 'login' });
                } catch (cErr) { console.warn('reCAPTCHA failed', cErr); }

                const response = await apiClient.login(email, password, captchaToken);
                const confirmed = await customAlert(currentLang === 'ar' ? 'تم تسجيل الدخول بنجاح!' : 'Login successful!');
                if (confirmed) window.location.href = 'index.html';

            } catch (err) {

                // ── Handle Country Mismatch ───────────────────────────────────
                if (err.code === 'COUNTRY_MISMATCH' || err.message.includes('registered in')) {
                    const accountCountry = err.accountCountry;
                    const countryNames    = { egypt: 'مصر 🇪🇬', uae: 'الإمارات 🇦🇪', ksa: 'السعودية 🇸🇦', qatar: 'قطر 🇶🇦' };
                    const countryNamesEn  = { egypt: 'Egypt 🇪🇬', uae: 'UAE 🇦🇪', ksa: 'Saudi Arabia 🇸🇦', qatar: 'Qatar 🇶🇦' };

                    const countryName = currentLang === 'ar'
                        ? (countryNames[accountCountry]   || accountCountry)
                        : (countryNamesEn[accountCountry] || accountCountry);

                    // captchaToken is now in scope ✅
                    showCountryMismatchModal(countryName, accountCountry, email, password, captchaToken);

                // ── Handle Unverified Email ───────────────────────────────────
                } else if (err.code === 'EMAIL_NOT_VERIFIED' || err.message.includes('verify your email')) {
                    const msg = currentLang === 'ar'
                        ? 'يجب التحقق من بريدك الإلكتروني أولاً. هل تريد إعادة إرسال رسالة التحقق؟'
                        : 'Your email is not verified. Would you like to resend the verification email?';
                    const resend = confirm(msg);
                    if (resend) {
                        try {
                            await apiClient.fetch('/auth/resend-verification-public', {
                                method: 'POST',
                                body: JSON.stringify({ email })
                            });
                            await customAlert(currentLang === 'ar' ? 'تم إرسال رسالة التحقق!' : 'Verification email sent!');
                        } catch (resendErr) {
                            await customAlert(currentLang === 'ar' ? 'تعذر إرسال الرسالة. حاول مرة أخرى.' : 'Could not send email. Try again.');
                        }
                    }

                // ── Suggest Reset after 3 attempts ───────────────────────────
                } else if (err.suggestReset) {
                    await customAlert(err.message);
                    // Show a persistent reset hint below the form
                    let hint = document.getElementById('reset-hint');
                    if (!hint) {
                        hint = document.createElement('div');
                        hint.id = 'reset-hint';
                        hint.className = 'mt-3 p-3 bg-orange-50 dark:bg-orange-900/30 rounded-xl text-sm text-center animate-fade-in';
                        hint.innerHTML = `<span class="text-orange-700 dark:text-orange-300">
                            ${currentLang === 'ar' ? 'هل نسيت كلمة السر؟' : 'Forgot your password?'}
                            <a href="forgot-password.html" class="font-bold underline ml-1">
                                ${currentLang === 'ar' ? 'استعادة الحساب' : 'Reset it now'}
                            </a></span>`;
                        loginForm.insertAdjacentElement('afterend', hint);
                    }

                // ── Account Locked: redirect to reset page ────────────────────
                } else if (err.code === 'ACCOUNT_LOCKED') {
                    await customAlert(
                        currentLang === 'ar'
                            ? 'تم قفل حسابك بسبب كثرة المحاولات الفاشلة. سيتم توجيهك لإعادة تعيين كلمة السر.'
                            : 'Account locked due to too many failed attempts. Redirecting to password reset...'
                    );
                    window.location.href = 'forgot-password.html?locked=1';

                // ── Generic error ─────────────────────────────────────────────
                } else {
                    await customAlert(err.message);
                }

            } finally {
                submitBtn.disabled = false;
                // ✅ Bug Fix #2: reset text explicitly — don't rely only on updatePageLanguage
                submitBtn.textContent = currentLang === 'ar' ? 'تسجيل الدخول' : 'Sign In';
                submitBtn.setAttribute('data-translate', 'signInBtn');
                if (window.updatePageLanguage) window.updatePageLanguage();
            }
        });

        // Signup Logic
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('signup-firstname').value;
            const lastName = document.getElementById('signup-lastname').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;

            if (password.length < 8) {
                await customAlert(currentLang === 'ar' ? 'كلمة المرور يجب أن تكون 8 أحرف على الأقل!' : 'Password must be at least 8 characters!');
                return;
            }

            if (password !== confirmPassword) {
                await customAlert(currentLang === 'ar' ? 'كلمات المرور غير متطابقة!' : 'Passwords do not match!');
                return;
            }

            try {
                // Get reCAPTCHA token
                let captchaToken = '';
                try {
                    captchaToken = await grecaptcha.execute('YOUR_SITE_KEY_HERE', { action: 'signup' });
                } catch (cErr) { console.warn('reCAPTCHA failed', cErr); }

                await apiClient.register({
                    name: `${firstName} ${lastName}`,
                    email,
                    password,
                    country: localStorage.getItem('selectedCountry') || 'uae',
                    captchaToken
                });
                const confirmed = await customAlert(currentLang === 'ar' ? 'تم إنشاء الحساب بنجاح!' : 'Account created successfully!');
                if (confirmed) window.location.href = 'index.html';
            } catch (err) {
                await customAlert(err.message);
            }
        });

        // Google Authentication
        async function handleCredentialResponse(response) {
            try {
                const res = await apiClient.googleLogin(response.credential);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error('Google Auth Error:', err);
            }
        }

        window.loginWithGoogle = function () {
            google.accounts.id.initialize({
                client_id: "892237002209-2o9susarhj5bji1f592an0c4u5rbakuh.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.prompt();
        }

        // Facebook Authentication
        window.fbAsyncInit = function () {
            FB.init({
                appId: 'YOUR_FACEBOOK_APP_ID', // Placeholder
                cookie: true,
                xfbml: true,
                version: 'v18.0'
            });
        };

        window.loginWithFacebook = function () {
            FB.login(function (response) {
                if (response.authResponse) {
                    handleFacebookResponse(response.authResponse.accessToken);
                } else {
                    console.log('User cancelled login or did not fully authorize.');
                }
            }, { scope: 'public_profile,email' });
        }

        async function handleFacebookResponse(accessToken) {
            try {
                const res = await apiClient.facebookLogin(accessToken);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error('Facebook Auth Error:', err);
                await customAlert(currentLang === 'ar' ? 'فشل تسجيل الدخول عبر فيسبوك' : 'Facebook login failed');
            }
        }

        // ── Country Mismatch Modal ────────────────────────────────────────────
        function showCountryMismatchModal(countryName, accountCountry, email, password, captchaToken) {
            const modal      = document.getElementById('country-mismatch-modal');
            const flagEl     = document.getElementById('cm-flag');
            const titleEl    = document.getElementById('cm-title');
            const bodyEl     = document.getElementById('cm-body');
            const switchBtn  = document.getElementById('cm-switch-btn');
            const cancelText = document.getElementById('cm-cancel');

            const flags = { egypt: '🇪🇬', uae: '🇦🇪', ksa: '🇸🇦', qatar: '🇶🇦' };
            flagEl.textContent = flags[accountCountry] || '🌍';

            if (currentLang === 'ar') {
                titleEl.textContent  = 'حساب مسجل في بلد مختلف';
                bodyEl.textContent   = `هذا الحساب مسجل في ${countryName}. هل تريد التبديل تلقائياً والدخول؟`;
                switchBtn.textContent = `التبديل إلى ${countryName} وتسجيل الدخول`;
                cancelText.textContent = 'إلغاء';
            } else {
                titleEl.textContent  = 'Account Registered in Different Country';
                bodyEl.textContent   = `This account is registered in ${countryName}. Switch automatically and log in?`;
                switchBtn.textContent = `Switch to ${countryName} & Sign In`;
                cancelText.textContent = 'Cancel';
            }

            // When user clicks switch: update country then retry login
            switchBtn.onclick = async () => {
                modal.classList.add('hidden');

                // Update localStorage to match the account's country
                const countryFlags = { egypt: '🇪🇬', uae: '🇦🇪', ksa: '🇸🇦', qatar: '🇶🇦' };
                const countryNamesEn = { egypt: 'Egypt', uae: 'UAE', ksa: 'KSA', qatar: 'Qatar' };
                localStorage.setItem('selectedCountry', accountCountry);
                localStorage.setItem('selectedCountrySource', 'account');
                localStorage.setItem('selectedCountryFlag', countryFlags[accountCountry] || '🌍');
                localStorage.setItem('selectedCountryName', countryNamesEn[accountCountry] || accountCountry);
                window.dispatchEvent(new CustomEvent('countryChanged', { detail: { country: accountCountry } }));

                // Retry login with the correct country now set
                try {
                    await apiClient.login(email, password, captchaToken);
                    const confirmed = await customAlert(
                        currentLang === 'ar' ? 'تم تسجيل الدخول بنجاح!' : 'Login successful!'
                    );
                    if (confirmed) window.location.href = 'index.html';
                } catch (retryErr) {
                    await customAlert(retryErr.message);
                }
            };

            modal.classList.remove('hidden');
        }
        // ─────────────────────────────────────────────────────────────────────
    </script>
</body>

</html>
