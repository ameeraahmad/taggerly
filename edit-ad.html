<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ad - Taggerly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        secondary: '#F5F5F5',
                        accent: '#FF6B00',
                        success: '#00C853',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-secondary dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <!-- Header Placeholder -->
    <div id="global-header-placeholder"></div>

    <div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8 animate-fade-in">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-8">Edit Ad</h1>

        <form id="edit-ad-form" class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg space-y-6">

            <!-- Category Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="categoryLabel">Category</label>
                <div class="flex gap-2">
                    <select id="ad-category" name="category" disabled
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
                        <option value="" disabled selected data-translate="selectCategory">Select Category</option>
                        <option value="Motors" data-translate="motorsTitle">Motors</option>
                        <option value="Property" data-translate="propertyTitle">Property</option>
                        <option value="Electronics" data-translate="electronicsCategoryTitle">Electronics</option>
                        <option value="Classifieds" data-translate="classifiedsTitle">Classifieds</option>
                        <option value="Jobs" data-translate="jobsTitle">Jobs</option>
                        <option value="Services" data-translate="servicesTitle">Services</option>
                    </select>
                    <div id="sub-category-badge"
                        class="hidden items-center bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-3 py-2 rounded-md font-bold text-sm whitespace-nowrap">
                        <!-- Subcategory text here -->
                    </div>
                </div>
            </div>

            <!-- Ad Details -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="adTitleLabel">Ad
                    Title</label>
                <input type="text" id="ad-title" name="title"
                    class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                    placeholder="e.g. iPhone 14 Pro Max for Sale" data-translate="adTitlePlaceholder">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="priceLabel">Price
                    (<span class="currency-label">AED</span>)</label>
                <input type="number" id="ad-price" name="price"
                    class="block w-1/2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                    placeholder="e.g. 3500" data-translate="pricePlaceholder">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="descriptionLabel">Description</label>
                <textarea id="ad-description" name="description" rows="5"
                    class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                    placeholder="Describe your item..." data-translate="descriptionPlaceholder"></textarea>
            </div>

            <!-- Motor Details (Conditional) -->
            <div id="motor-details" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="year">Year</label>
                    <input type="number" id="ad-year" name="year"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="e.g. 2024">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="kilometers">Kilometers</label>
                    <input type="number" id="ad-kilometers" name="kilometers"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="e.g. 15000">
                </div>
            </div>

            <!-- Property Details (Conditional) -->
            <div id="property-details" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="bedRooms">Bedrooms</label>
                    <input type="number" id="ad-bedrooms" name="bedrooms"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="e.g. 3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="bathRooms">Bathrooms</label>
                    <input type="number" id="ad-bathrooms" name="bathrooms"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="e.g. 2">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="propertyType">Property Type</label>
                    <select id="ad-property-type" name="propertyType"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
                        <option value="Apartment" data-translate="apartment">Apartment</option>
                        <option value="Villa" data-translate="villa">Villa</option>
                        <option value="Townhouse" data-translate="townHouse">Townhouse</option>
                        <option value="Penthouse" data-translate="pentHouse">Penthouse</option>
                        <option value="Duplex" data-translate="duplex">Duplex</option>
                        <option value="Twin House" data-translate="twinHouse">Twin House</option>
                        <option value="Roof" data-translate="roof">Roof</option>
                        <option value="Commercial" data-translate="commercial">Commercial</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                        data-translate="areaLabel">Area (Sq. Ft)</label>
                    <input type="number" id="ad-area-size" name="area"
                        class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="1500">
                </div>

                <!-- Completion Status -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" data-translate="completionStatus">Completion status*</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="completionStatus" value="Ready" class="peer hidden" checked>
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="ready">Ready</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="completionStatus" value="Resale" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="resale">Resale</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="completionStatus" value="Off-plan" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="offPlan">Off-plan</span>
                        </label>
                    </div>
                </div>

                <!-- Furnished -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" data-translate="furnished">Furnished*</label>
                    <div class="flex gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="furnished" value="Yes" class="peer hidden">
                            <span class="px-6 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="yes">Yes</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="furnished" value="No" class="peer hidden" checked>
                            <span class="px-6 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="no">No</span>
                        </label>
                    </div>
                </div>

                <!-- Amenities -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" data-translate="amenities">Amenities*</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Security" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="security">Security</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Covered Parking" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="coveredParking">Covered Parking</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Private Garden" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="privateGarden">Private Garden</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Maids Room" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="maidsRoom">Maids Room</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Elevator" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="elevator">Elevator</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="checkbox" name="amenities" value="Pool" class="peer hidden">
                            <span class="px-4 py-2 border rounded-full text-sm font-medium border-gray-300 peer-checked:border-accent peer-checked:bg-orange-50 peer-checked:text-accent transition block" data-translate="pool">Pool</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Payment Method -->
            <div id="payment-method-details" class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" data-translate="paymentMethod">Payment Method</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <label class="flex items-center gap-3 p-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-accent transition has-[:checked]:border-accent has-[:checked]:bg-orange-50 dark:has-[:checked]:bg-orange-900/20">
                        <input type="radio" name="paymentMethod" value="Cash" class="accent-accent w-4 h-4" checked>
                        <div>
                            <span class="block font-semibold text-sm text-gray-800 dark:text-gray-100" data-translate="paymentCash">Cash</span>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-accent transition has-[:checked]:border-accent has-[:checked]:bg-orange-50 dark:has-[:checked]:bg-orange-900/20">
                        <input type="radio" name="paymentMethod" value="Installment" class="accent-accent w-4 h-4">
                        <div>
                            <span class="block font-semibold text-sm text-gray-800 dark:text-gray-100" data-translate="paymentInstallment">Installment</span>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-accent transition has-[:checked]:border-accent has-[:checked]:bg-orange-50 dark:has-[:checked]:bg-orange-900/20">
                        <input type="radio" name="paymentMethod" value="Cash or Installment" class="accent-accent w-4 h-4">
                        <div>
                            <span class="block font-semibold text-sm text-gray-800 dark:text-gray-100" data-translate="paymentBoth">Cash or Installment</span>
                        </div>
                    </label>
                </div>
            </div>

            <div id="condition-details">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="condition">Condition</label>
                <select id="ad-condition" name="itemCondition"
                    class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
                    <option value="New">New</option>
                    <option value="Used">Used</option>
                    <option value="Certified Pre-owned">Certified Pre-owned</option>
                </select>
            </div>

            <!-- Pre-existing Images -->
            <div id="existing-images-container" class="hidden">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Current Photos</label>
                <div id="existing-images-list" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-4"></div>
            </div>

            <!-- Status is managed by backend; hidden input preserves current status -->
            <input type="hidden" id="ad-status" name="status">

            <!-- Image Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Add New Photos</label>
                <div id="drop-zone"
                    class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 dark:border-gray-600 border-dashed rounded-md hover:border-accent transition cursor-pointer bg-gray-50 dark:bg-gray-700">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none"
                            viewBox="0 0 48 48" aria-hidden="true">
                            <path
                                d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600 dark:text-gray-300">
                            <label for="file-upload"
                                class="relative cursor-pointer bg-white dark:bg-gray-800 rounded-md font-medium text-accent hover:text-orange-500 focus-within:outline-none">
                                <span data-translate="uploadFile">Upload a file</span>
                                <input id="file-upload" name="images" type="file" class="sr-only" multiple
                                    accept="image/*">
                            </label>
                            <p class="pl-1" data-translate="dragDrop">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500" data-translate="uploadLimits">PNG, JPG, GIF up to 5MB</p>
                    </div>
                </div>
                <div id="preview-container" class="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
            </div>

            <!-- Location -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" data-translate="locationGovernorateCity">Location (Governorate/City)</label>
                <div id="location-select-container" class="relative flex gap-2">
                    <div class="relative flex-grow">
                        <input type="text" id="location-search-input" placeholder="Search City/Governorate..."
                            class="block w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 pr-10 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm transition-colors">
                        <svg class="w-5 h-5 text-gray-400 absolute right-3 top-2.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <div id="location-results"
                        class="absolute z-[100] w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl mt-1 hidden max-h-60 overflow-y-auto top-[42px]">
                        <!-- Results populated dynamically -->
                    </div>
                </div>
                <select id="post-ad-location" name="city" class="hidden" data-dynamic-location="true">
                    <!-- Options populated dynamically -->
                </select>
            </div>

            <!-- Contact Phone -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                    data-translate="phoneLabel">Contact Phone
                    Number</label>
                <div class="relative">
                    <div
                        class="absolute inset-y-0 left-0 rtl:right-0 rtl:left-auto pl-3 rtl:pr-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                            </path>
                        </svg>
                    </div>
                    <input type="tel" id="ad-phone" name="phone"
                        class="block w-full pl-10 rtl:pr-10 rtl:pl-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
                        placeholder="e.g. +971 50 123 4567" data-translate="phonePlaceholder">
                </div>
            </div>

            <div class="pt-4 flex justify-end rtl:justify-start gap-4">
                <button type="button" onclick="window.history.back()"
                    class="px-8 py-3 rounded-full font-bold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                    Cancel
                </button>
                <button type="submit"
                    class="bg-accent text-white px-8 py-3 rounded-full font-bold hover:bg-orange-600 transition shadow-lg transform hover:-translate-y-0.5 sm:w-auto">
                    Update Ad
                </button>
            </div>

        </form>
    </div>

    <!-- Footer Placeholder -->
    <div id="global-footer-placeholder"></div>


    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const adId = urlParams.get('id');

            if (!adId) {
                const confirmed = await customAlert('No Ad ID provided');
                if (confirmed) window.location.href = 'dashboard.html';
                return;
            }

            const form = document.getElementById('edit-ad-form');
            const fileInput = document.getElementById('file-upload');
            const previewContainer = document.getElementById('preview-container');
            const categorySelect = document.getElementById('ad-category');
            const additionalDetails = document.getElementById('additional-details');

            const populateCities = () => {
                const country = window.selectedCountry || localStorage.getItem('selectedCountry') || 'uae';
                const cities = (window.locations && window.locations[country]) ? window.locations[country] : [];
                const locationSelect = document.getElementById('post-ad-location');
                locationSelect.innerHTML = '<option value="" disabled data-translate="selectLocation">Select Location</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
            };

            const locSearchInput = document.getElementById('location-search-input');
            const locResultsDiv = document.getElementById('location-results');
            const hiddenSelect = document.getElementById('post-ad-location');

            const updateLocationResults = (filter = '') => {
                const country = window.selectedCountry || localStorage.getItem('selectedCountry') || 'uae';
                const cities = (window.locations && window.locations[country]) ? window.locations[country] : [];
                
                const lowerFilter = filter.toLowerCase().trim();
                let filtered = cities.filter(c => c.toLowerCase().includes(lowerFilter));
                
                locResultsDiv.innerHTML = '';
                
                if (filtered.length > 0) {
                    filtered.forEach(city => {
                        const div = document.createElement('div');
                        div.className = 'px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer text-sm text-gray-800 dark:text-gray-200';
                        div.textContent = city;
                        div.onclick = () => selectCity(city);
                        locResultsDiv.appendChild(div);
                    });
                } else {
                    const div = document.createElement('div');
                    div.className = 'px-4 py-3 text-sm text-gray-500 flex flex-col gap-2';
                    const lang = window.currentLang || 'en';
                    const label = (window.translations && window.translations[lang] && window.translations[lang].useCustomLocation) || 'Use as location';
                    
                    div.innerHTML = `
                        <span class="italic">No exact match found.</span>
                        <button type="button" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md text-xs font-bold w-fit hover:bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400">
                            + ${label}: "${filter}"
                        </button>
                    `;
                    div.querySelector('button').onclick = () => selectCity(filter);
                    locResultsDiv.appendChild(div);
                }
                
                locResultsDiv.classList.remove('hidden');
            };

            const selectCity = (city) => {
                locSearchInput.value = city;
                locResultsDiv.classList.add('hidden');
                
                // Add to hidden select if not exists
                let exists = Array.from(hiddenSelect.options).some(o => o.value.toLowerCase() === city.toLowerCase());
                if (!exists) {
                    const opt = document.createElement('option');
                    opt.value = city;
                    opt.textContent = city;
                    hiddenSelect.appendChild(opt);
                }
                hiddenSelect.value = city;
            };

            if (locSearchInput) {
                locSearchInput.addEventListener('focus', () => updateLocationResults(locSearchInput.value));
                locSearchInput.addEventListener('input', () => updateLocationResults(locSearchInput.value));
                
                document.addEventListener('click', (e) => {
                    const container = document.getElementById('location-select-container');
                    if (container && !container.contains(e.target)) {
                        locResultsDiv.classList.add('hidden');
                    }
                });
            }

            // Handle Image Management
            let selectedFiles = [];
            let existingImages = [];

            const renderNewPreviews = () => {
                previewContainer.innerHTML = '';
                selectedFiles.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const previewHtml = `
                            <div class="relative group h-24 bg-gray-100 dark:bg-gray-700 rounded-md overflow-hidden border dark:border-gray-600">
                                <img src="${e.target.result}" class="w-full h-full object-cover">
                                <button type="button" onclick="removeNewFile(${index})" 
                                    class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition shadow-md hover:bg-red-600">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                    </svg>
                                </button>
                            </div>
                        `;
                        previewContainer.insertAdjacentHTML('beforeend', previewHtml);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const renderExistingImages = () => {
                const existingContainer = document.getElementById('existing-images-container');
                const existingList = document.getElementById('existing-images-list');
                
                if (existingImages.length === 0) {
                    existingContainer.classList.add('hidden');
                    return;
                }

                existingContainer.classList.remove('hidden');
                existingList.innerHTML = '';
                existingImages.forEach((img, index) => {
                    existingList.insertAdjacentHTML('beforeend', `
                        <div class="relative group h-24 bg-gray-100 dark:bg-gray-700 rounded-md overflow-hidden border dark:border-gray-600">
                            <img src="${img}" class="w-full h-full object-cover">
                            <button type="button" onclick="removeExistingImage(${index})" 
                                class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition shadow-md hover:bg-red-600">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    `);
                });
            };

            window.removeNewFile = (index) => {
                selectedFiles.splice(index, 1);
                renderNewPreviews();
            };

            window.removeExistingImage = (index) => {
                existingImages.splice(index, 1);
                renderExistingImages();
            };

            // Load Existing Data
            try {
                const response = await apiClient.getAd(adId);
                const ad = response.data;
                const user = JSON.parse(localStorage.getItem('user'));

                if (ad.userId !== user.id && user.role !== 'admin') {
                    const confirmed = await customAlert('Not authorized to edit this ad');
                    if (confirmed) window.location.href = 'dashboard.html';
                    return;
                }

                // Populate basic fields
                document.getElementById('ad-title').value = ad.title || '';
                document.getElementById('ad-price').value = ad.price || '';
                document.getElementById('ad-description').value = ad.description || '';
                if (ad.category) {
                    const catOptions = Array.from(categorySelect.options);
                    const match = catOptions.find(o => o.value.toLowerCase() === ad.category.toLowerCase().trim());
                    if (match) {
                        categorySelect.value = match.value;
                    } else {
                        const newOpt = document.createElement('option');
                        newOpt.value = ad.category;
                        newOpt.textContent = ad.category;
                        categorySelect.appendChild(newOpt);
                        categorySelect.value = ad.category;
                    }
                    categorySelect.dispatchEvent(new Event('change'));
                }// Subcategory badge
                const subCategoryBadge = document.getElementById('sub-category-badge');
                if (ad.subCategory) {
                    subCategoryBadge.textContent = ad.subCategory;
                    subCategoryBadge.classList.remove('hidden');
                    subCategoryBadge.classList.add('flex');
                    // Store it so we can send it back
                    subCategoryBadge.dataset.sub = ad.subCategory;
                }

                document.getElementById('ad-year').value = ad.year || '';
                document.getElementById('ad-kilometers').value = ad.kilometers || '';
                document.getElementById('ad-condition').value = ad.itemCondition || 'Used';
                
                // Property Fields
                if (document.getElementById('ad-bedrooms')) document.getElementById('ad-bedrooms').value = ad.bedrooms || '';
                if (document.getElementById('ad-bathrooms')) document.getElementById('ad-bathrooms').value = ad.bathrooms || '';
                if (document.getElementById('ad-area-size')) document.getElementById('ad-area-size').value = ad.area || '';
                if (document.getElementById('ad-property-type')) document.getElementById('ad-property-type').value = ad.propertyType || 'Apartment';
                
                if (ad.category === 'Property') {
                    if (ad.completionStatus) {
                        const csRadio = document.querySelector(`input[name="completionStatus"][value="${ad.completionStatus}"]`);
                        if (csRadio) csRadio.checked = true;
                    }
                    if (ad.furnished) {
                        const fRadio = document.querySelector(`input[name="furnished"][value="${ad.furnished}"]`);
                        if (fRadio) fRadio.checked = true;
                    }
                    if (ad.amenities && Array.isArray(ad.amenities)) {
                        ad.amenities.forEach(amenity => {
                            const cb = document.querySelector(`input[name="amenities"][value="${amenity}"]`);
                            if (cb) cb.checked = true;
                        });
                    }
                }

                // Populate cities based on ad's country THEN set the city value
                populateCities();
                const locSelect = document.getElementById('post-ad-location');
                if (ad.city) {
                    selectCity(ad.city);
                } else {
                    locSelect.value = '';
                }

                document.getElementById('ad-phone').value = ad.phone || '';

                // Preserve current status via hidden input
                document.getElementById('ad-status').value = ad.status || 'active';

                // Update currency display only (without touching location dropdown)
                if (ad.country && window.setCountry) {
                    const flags = { 'uae': '🇦🇪', 'egypt': '🇪🇬', 'ksa': '🇸🇦', 'qatar': '🇶🇦' };
                    const names = { 'uae': 'UAE', 'egypt': 'Egypt', 'ksa': 'Saudi Arabia', 'qatar': 'Qatar' };
                    window.setCountry(ad.country, flags[ad.country] || '🌐', names[ad.country] || ad.country);
                }
                if (ad.paymentMethod) {
                    const payRadio = document.querySelector(`input[name="paymentMethod"][value="${ad.paymentMethod}"]`);
                    if (payRadio) payRadio.checked = true;
                }

                // Toggle fields based on category
                const motorDetails = document.getElementById('motor-details');
                const propertyDetails = document.getElementById('property-details');
                const conditionDetails = document.getElementById('condition-details');
                const paymentMethodDetails = document.getElementById('payment-method-details');

                if (ad.category === 'Motors') {
                    motorDetails.classList.remove('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.remove('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else if (ad.category === 'Property') {
                    propertyDetails.classList.remove('hidden');
                    motorDetails.classList.add('hidden');
                    conditionDetails.classList.add('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else if (ad.category === 'Electronics' || ad.category === 'Classifieds') {
                    motorDetails.classList.add('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.remove('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else {
                    motorDetails.classList.add('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.add('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.add('hidden');
                }

                // Store and render existing images
                existingImages = ad.images || [];
                renderExistingImages();

            } catch (err) {
                console.error('Error fetching ad:', err);
                await customAlert('Failed to load ad details');
            }

            categorySelect.addEventListener('change', () => {
                const motorDetails = document.getElementById('motor-details');
                const propertyDetails = document.getElementById('property-details');
                const conditionDetails = document.getElementById('condition-details');
                const paymentMethodDetails = document.getElementById('payment-method-details');

                if (categorySelect.value === 'Motors') {
                    motorDetails.classList.remove('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.remove('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else if (categorySelect.value === 'Property') {
                    propertyDetails.classList.remove('hidden');
                    motorDetails.classList.add('hidden');
                    conditionDetails.classList.add('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else if (categorySelect.value === 'Electronics' || categorySelect.value === 'Classifieds') {
                    motorDetails.classList.add('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.remove('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.remove('hidden');
                } else {
                    motorDetails.classList.add('hidden');
                    propertyDetails.classList.add('hidden');
                    conditionDetails.classList.add('hidden');
                    if (paymentMethodDetails) paymentMethodDetails.classList.add('hidden');
                }
            });

            fileInput.addEventListener('change', () => {
                const files = Array.from(fileInput.files);
                selectedFiles = [...selectedFiles, ...files];
                renderNewPreviews();
                fileInput.value = '';
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(form);
                
                // Ensure critical fields are included (category is disabled so must be appended manually)
                if (!formData.has('category')) formData.append('category', categorySelect.value || '');
                
                const subCategoryBadge = document.getElementById('sub-category-badge');
                if (subCategoryBadge && subCategoryBadge.dataset.sub) {
                    formData.append('subCategory', subCategoryBadge.dataset.sub);
                }

                if (!formData.has('city')) formData.append('city', document.getElementById('post-ad-location')?.value || '');
                if (!formData.has('country')) formData.append('country', window.selectedCountry || localStorage.getItem('selectedCountry') || 'uae');
                
                // Handle amenities specifically (collect all checked boxes)
                if (categorySelect.value === 'Property') {
                    const amenities = Array.from(document.querySelectorAll('input[name="amenities"]:checked')).map(cb => cb.value);
                    formData.delete('amenities'); 
                    formData.append('amenities', JSON.stringify(amenities));
                }
                
                // Handle images properly
                formData.delete('images'); // Remove any empty file inputs from the raw form
                if (selectedFiles.length > 0) {
                    selectedFiles.forEach(file => {
                        formData.append('images', file);
                    });
                }
                
                // Add existing images as a stringified array
                formData.append('existingImages', JSON.stringify(existingImages));

                try {
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Updating...';

                    await apiClient.updateAd(adId, formData);
                    const confirmed = await customAlert('Ad updated successfully!');
                    if (confirmed) window.location.href = 'dashboard.html';
                } catch (err) {
                    let errorMsg = err.message || 'Validation failed';
                    if (err.errors && Array.isArray(err.errors)) {
                        errorMsg = err.errors.map(e => Object.values(e)[0]).join('\n');
                    }
                    await customAlert(errorMsg);
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Ad';
                }
            });
        });
    </script>
</body>

</html>
