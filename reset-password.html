<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="resetPassword">Reset Password - Dubizzle Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">
    <!-- Header Placeholder -->
    <div id="global-header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border dark:border-gray-700">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Set New Password</h2>
                <p class="mt-2 text-gray-600 dark:text-gray-400">Please enter your new password below.</p>
            </div>

            <form id="reset-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-1">New Password</label>
                    <input type="password" id="password" required minlength="8"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required minlength="8"
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full bg-accent py-3 rounded-lg text-white font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-lg">
                    Reset Password
                </button>
            </form>

            <div id="success-msg"
                class="hidden text-center p-4 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 rounded-lg">
                <p>Password reset successful! Redirecting to login...</p>
            </div>
        </div>
    </main>

    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Invalid or missing reset token.');
            window.location.href = 'login.html';
        }

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await apiClient.fetch(`/auth/reset-password/${token}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ password })
                });

                if (res.success) {
                    document.getElementById('reset-form').classList.add('hidden');
                    document.getElementById('success-msg').classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        };
    </script>
</body>

</html>
