<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Tagger</title>
    <meta name="description" content="Reset your Tagger account password via email or phone OTP.">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0B2447', accent: '#FF6B00' },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(16px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }

        /* OTP Input boxes */
        .otp-input {
            width: 48px; height: 56px;
            font-size: 24px; font-weight: 700; text-align: center;
            border: 2px solid #e5e7eb; border-radius: 12px;
            outline: none; transition: all 0.2s;
            background: transparent;
        }
        .otp-input:focus { border-color: #FF6B00; box-shadow: 0 0 0 3px rgba(255,107,0,0.15); }
        .dark .otp-input { border-color: #4b5563; color: #fff; }
        .dark .otp-input:focus { border-color: #FF6B00; }

        /* Step indicator */
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e5e7eb; transition: all 0.3s; }
        .step-dot.active { background: #FF6B00; transform: scale(1.3); }
        .step-dot.done { background: #22c55e; }

        /* Tab */
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: #FF6B00; color: white; }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div id="global-header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border dark:border-gray-700 animate-slide-up">

            <!-- Step Indicator -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="step-dot active" id="dot-1"></div>
                <div class="h-px w-10 bg-gray-200 dark:bg-gray-600"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="h-px w-10 bg-gray-200 dark:bg-gray-600"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <!-- ── STEP 1: Choose method ─────────────────────────── -->
            <div id="step-1" class="animate-fade-in">
                <div class="text-center mb-6">
                    <div class="text-5xl mb-3">🔐</div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h2>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Choose how to receive your reset code</p>
                </div>

                <!-- Method Tabs -->
                <div class="flex rounded-xl border dark:border-gray-600 overflow-hidden mb-6">
                    <button id="tab-email" onclick="switchTab('email')"
                        class="tab-btn active flex-1 py-3 text-sm font-semibold flex items-center justify-center gap-2">
                        ✉️ <span>Email</span>
                    </button>
                    <button id="tab-phone" onclick="switchTab('phone')"
                        class="tab-btn flex-1 py-3 text-sm font-semibold flex items-center justify-center gap-2 text-gray-600 dark:text-gray-300">
                        📱 <span>Phone Number</span>
                    </button>
                </div>

                <!-- Email Input -->
                <div id="input-email">
                    <label class="block text-sm font-medium mb-1">Email Address</label>
                    <input id="field-email" type="email" autocomplete="email"
                        class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="example@mail.com">
                </div>

                <!-- Phone Input -->
                <div id="input-phone" class="hidden">
                    <label class="block text-sm font-medium mb-1">Phone Number</label>
                    <div class="flex gap-2">
                        <select id="country-code"
                            class="px-3 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition text-sm">
                            <option value="+20">🇪🇬 +20</option>
                            <option value="+971">🇦🇪 +971</option>
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+974">🇶🇦 +974</option>
                        </select>
                        <input id="field-phone" type="tel"
                            class="flex-1 px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                            placeholder="5X XXX XXXX">
                    </div>
                </div>

                <button id="send-otp-btn" onclick="sendOTP()"
                    class="mt-6 w-full bg-accent py-3 rounded-xl text-white font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-lg">
                    Send OTP Code
                </button>
            </div>

            <!-- ── STEP 2: Enter OTP ────────────────────────────── -->
            <div id="step-2" class="hidden animate-fade-in">
                <div class="text-center mb-6">
                    <div class="text-5xl mb-3" id="s2-icon">✉️</div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Enter OTP</h2>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                        Code sent to <span id="sent-to-label" class="font-semibold text-accent"></span>
                    </p>
                    <p class="text-xs text-gray-400 mt-1">Expires in <span id="otp-countdown" class="font-bold text-orange-500">10:00</span></p>
                </div>

                <!-- 6 OTP boxes -->
                <div class="flex justify-center gap-2 mb-6" id="otp-boxes">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-0">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-1">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-2">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-3">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-4">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp-5">
                </div>

                <button onclick="verifyOTP()"
                    class="w-full bg-accent py-3 rounded-xl text-white font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-lg">
                    Verify Code
                </button>

                <p class="text-center text-sm text-gray-500 mt-4">
                    Didn't receive it?
                    <button onclick="sendOTP(true)" class="text-accent font-bold hover:underline ml-1">Resend</button>
                </p>
            </div>

            <!-- ── STEP 3: New Password ─────────────────────────── -->
            <div id="step-3" class="hidden animate-fade-in">
                <div class="text-center mb-6">
                    <div class="text-5xl mb-3">🆕</div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">New Password</h2>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Choose a strong new password</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">New Password</label>
                        <input id="new-password" type="password" autocomplete="new-password"
                            class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                            placeholder="At least 8 characters">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Confirm Password</label>
                        <input id="confirm-password" type="password" autocomplete="new-password"
                            class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                            placeholder="Repeat password">
                    </div>
                    <!-- Strength bar -->
                    <div>
                        <div class="h-1.5 rounded-full bg-gray-200 dark:bg-gray-600 overflow-hidden">
                            <div id="strength-bar" class="h-full rounded-full transition-all duration-300" style="width:0%"></div>
                        </div>
                        <p id="strength-label" class="text-xs mt-1 text-gray-400"></p>
                    </div>
                </div>

                <button onclick="resetPassword()"
                    class="mt-6 w-full bg-primary py-3 rounded-xl text-white font-bold hover:bg-blue-900 transition transform hover:-translate-y-0.5 shadow-lg">
                    Reset Password
                </button>
            </div>

            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <a href="login.html" class="text-sm text-gray-500 hover:text-accent transition">← Back to Login</a>
            </div>
        </div>
    </main>

    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // ── State ─────────────────────────────────────────────────────────────
        let currentMethod = 'email';
        let currentValue  = '';
        let resetToken    = '';
        let countdownTimer;

        // ── Tab Switch ────────────────────────────────────────────────────────
        function switchTab(method) {
            currentMethod = method;
            document.getElementById('tab-email').classList.toggle('active', method === 'email');
            document.getElementById('tab-phone').classList.toggle('active', method === 'phone');
            document.getElementById('tab-email').classList.toggle('text-gray-600', method !== 'email');
            document.getElementById('tab-phone').classList.toggle('text-gray-600', method !== 'phone');
            document.getElementById('input-email').classList.toggle('hidden', method !== 'email');
            document.getElementById('input-phone').classList.toggle('hidden', method !== 'phone');
        }

        // ── Send OTP ──────────────────────────────────────────────────────────
        async function sendOTP(isResend = false) {
            let value = '';
            if (currentMethod === 'email') {
                value = document.getElementById('field-email').value.trim();
                if (!value) return alert('Please enter your email address.');
            } else {
                const code   = document.getElementById('country-code').value;
                const number = document.getElementById('field-phone').value.trim();
                if (!number) return alert('Please enter your phone number.');
                value = code + number.replace(/^0/, '');
            }
            currentValue = value;

            const btn = document.getElementById('send-otp-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

            try {
                const res = await apiClient.fetch('/auth/send-otp', {
                    method: 'POST',
                    body: JSON.stringify({ method: currentMethod, value })
                });

                document.getElementById('sent-to-label').textContent = res.sentTo || value;
                document.getElementById('s2-icon').textContent = currentMethod === 'email' ? '✉️' : '📱';

                goToStep(2);
                startCountdown(10 * 60);
                document.getElementById('otp-0').focus();

                if (isResend) alert('A new OTP has been sent!');
            } catch (err) {
                alert(err.message);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Send OTP Code'; }
            }
        }

        // ── Verify OTP ────────────────────────────────────────────────────────
        async function verifyOTP() {
            const otp = Array.from({ length: 6 }, (_, i) => document.getElementById(`otp-${i}`).value).join('');
            if (otp.length < 6) return alert('Please enter the complete 6-digit code.');

            try {
                const res = await apiClient.fetch('/auth/verify-otp', {
                    method: 'POST',
                    body: JSON.stringify({ method: currentMethod, value: currentValue, otp })
                });
                resetToken = res.resetToken;
                clearInterval(countdownTimer);
                goToStep(3);
                document.getElementById('new-password').focus();
            } catch (err) {
                alert(err.message);
                // Shake the OTP boxes
                document.getElementById('otp-boxes').classList.add('animate-bounce');
                setTimeout(() => document.getElementById('otp-boxes').classList.remove('animate-bounce'), 500);
            }
        }

        // ── Reset Password ────────────────────────────────────────────────────
        async function resetPassword() {
            const newPass     = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass.length < 8) return alert('Password must be at least 8 characters.');
            if (newPass !== confirmPass) return alert('Passwords do not match.');

            try {
                await apiClient.fetch(`/auth/reset-password/${resetToken}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ password: newPass })
                });
                alert('✅ Password reset successfully! Please log in with your new password.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
            }
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        function goToStep(n) {
            [1, 2, 3].forEach(i => {
                document.getElementById(`step-${i}`).classList.toggle('hidden', i !== n);
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('active', 'done');
                if (i < n) dot.classList.add('done');
                else if (i === n) dot.classList.add('active');
            });
        }

        function startCountdown(seconds) {
            clearInterval(countdownTimer);
            let remaining = seconds;
            const el = document.getElementById('otp-countdown');
            countdownTimer = setInterval(() => {
                remaining--;
                const m = String(Math.floor(remaining / 60)).padStart(2, '0');
                const s = String(remaining % 60).padStart(2, '0');
                el.textContent = `${m}:${s}`;
                if (remaining <= 0) {
                    clearInterval(countdownTimer);
                    el.textContent = 'Expired';
                    el.classList.add('text-red-500');
                }
            }, 1000);
        }

        // OTP auto-advance
        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 0; i < 6; i++) {
                const input = document.getElementById(`otp-${i}`);
                input.addEventListener('input', (e) => {
                    const val = e.target.value.replace(/\D/g, '');
                    e.target.value = val.slice(-1);
                    if (val && i < 5) document.getElementById(`otp-${i + 1}`).focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && i > 0) {
                        document.getElementById(`otp-${i - 1}`).focus();
                    }
                });
                // Paste support
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    text.split('').forEach((ch, idx) => {
                        const el = document.getElementById(`otp-${idx}`);
                        if (el) el.value = ch;
                    });
                    document.getElementById(`otp-${Math.min(text.length, 5)}`).focus();
                });
            }

            // Password strength meter
            document.getElementById('new-password').addEventListener('input', function () {
                const val = this.value;
                let score = 0;
                if (val.length >= 8) score++;
                if (/[A-Z]/.test(val)) score++;
                if (/[0-9]/.test(val)) score++;
                if (/[^A-Za-z0-9]/.test(val)) score++;

                const bar = document.getElementById('strength-bar');
                const label = document.getElementById('strength-label');
                const levels = [
                    { w: '0%', color: 'transparent', text: '' },
                    { w: '25%', color: '#ef4444', text: '😟 Weak' },
                    { w: '50%', color: '#f97316', text: '🤔 Fair' },
                    { w: '75%', color: '#eab308', text: '😊 Good' },
                    { w: '100%', color: '#22c55e', text: '💪 Strong' },
                ];
                bar.style.width  = levels[score].w;
                bar.style.background = levels[score].color;
                label.textContent = levels[score].text;
            });

            // Check if came from locked account
            const params = new URLSearchParams(window.location.search);
            if (params.get('locked') === '1') {
                const banner = document.createElement('div');
                banner.className = 'mb-4 p-3 bg-orange-50 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300 rounded-xl text-sm text-center';
                banner.textContent = '⚠️ Your account was locked due to too many failed attempts. Reset your password to regain access.';
                document.getElementById('step-1').insertAdjacentElement('afterbegin', banner);
            }
        });
    </script>
</body>
</html>
