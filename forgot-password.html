<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="forgotPassword">Forgot Password - Taggerly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">
    <!-- Header Placeholder -->
    <div id="global-header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border dark:border-gray-700">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white" data-translate="forgotPassword">Forgot
                    Password</h2>
                <p class="mt-2 text-gray-600 dark:text-gray-400" data-translate="forgotSubtitle">Enter your email and
                    we'll send you a link to reset your password.</p>
            </div>

            <form id="forgot-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-1" data-translate="emailPlaceholder">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-accent outline-none transition"
                        placeholder="example@mail.com">
                </div>
                <button type="submit"
                    class="w-full bg-accent py-3 rounded-lg text-white font-bold hover:bg-orange-600 transition transform hover:-translate-y-0.5 shadow-lg">
                    Send Link
                </button>
            </form>

            <div id="success-msg"
                class="hidden text-center p-4 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 rounded-lg">
                <p>Check your email! A password reset link has been sent.</p>
            </div>

            <div class="mt-6 text-center">
                <a href="login.html" class="text-sm text-gray-600 dark:text-gray-400 hover:text-accent font-medium">Back
                    to Login</a>
            </div>
        </div>
    </main>

    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const successMsg = document.getElementById('success-msg');

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await apiClient.fetch('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });

                if (res.success) {
                    document.getElementById('forgot-form').classList.add('hidden');
                    successMsg.classList.remove('hidden');
                }
            } catch (err) {
                await customAlert(err.message);
                btn.disabled = false;
                btn.textContent = 'Send Link';
            }
        };
    </script>
</body>

</html>
