<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed - Taggerly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B2447',
                        accent: '#FF6B00',
                    }
                }
            }
        }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 text-center animate-fade-in border dark:border-gray-700">
        <div class="w-20 h-20 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-accent">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-4" id="title">Unsubscribed Successfully</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8" id="message">You have been removed from our mailing list. We are sorry to see you go!</p>
        <a href="/" class="inline-block bg-primary dark:bg-accent text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition shadow-lg" id="back-btn">
            Go back to Taggerly
        </a>
    </div>

    <script src="assets/js/en.js"></script>
    <script src="assets/js/ar.js"></script>
    <script>
        const lang = localStorage.getItem('lang') || 'en';
        const translations = {
            en: enTranslations,
            ar: arTranslations
        };
        
        if (lang === 'ar') {
            document.documentElement.dir = 'rtl';
            document.getElementById('title').textContent = 'تم إلغاء الاشتراك بنجاح';
            document.getElementById('message').textContent = 'تمت إزالتك من قائمتنا البريدية. نأسف لمغادرتك!';
            document.getElementById('back-btn').textContent = 'العودة إلى تاجرلي';
        }
    </script>
</body>
</html>
